name: Deploy Coding Agent

on:
  push:
    branches: [main]
    paths:
      - 'agents/coding-agent/**'
      - 'packages/core/**'
      - 'packages/llm/**'
      - 'packages/tools/**'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync workspace
        run: uv sync --package coding-agent

      - name: Run agent (smoke test)
        run: uv run --package coding-agent python -c "from src.graph import graph; print('graph compiled ok')"

